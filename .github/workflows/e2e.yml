name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Apply D1 schema
        run: npx wrangler d1 execute sps --local --file=src/db/schema.sql

      - name: Start dev server
        run: |
          mkdir -p .wrangler
          node ./node_modules/.bin/astro dev --port 4322 > .wrangler/e2e-dev.log 2>&1 &
          # Wait for the server to be ready
          timeout 60 bash -c 'until curl -s http://localhost:4322 > /dev/null 2>&1; do sleep 1; done'
          echo "Dev server is ready"

      - name: Run e2e tests
        run: bun run test:e2e
