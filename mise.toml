[tools]
bun = "1.3.12"
"npm:agent-browser" = "0.15.1"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"
CLOUDFLARE_ACCOUNT_ID = "6de942b9cdb2c3f3d040fdbe3c1975c5"

[tasks.dev]
description = "Start development server"
run = "astro dev"

[tasks.build]
description = "Build the project"
run = "astro build"

[tasks.preview]
description = "Preview the build"
run = "astro preview"

[tasks.test]
description = "Run tests"
run = "vitest"

[tasks.send-email]
description = "Send a test email"
run = "bun scripts/send-test-email.ts"
raw = true

